services:
  - type: web
    name: grant-reviewer-worker
    runtime: docker
    dockerfilePath: ./Dockerfile
    region: ohio
    plan: starter
    envVars:
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: ANTHROPIC_MODEL
        value: claude-sonnet-4-5
      - key: SUPABASE_URL
        value: https://oshzvamtckpptdjkqdvl.supabase.co
      - key: SUPABASE_SERVICE_ROLE_KEY
        sync: false
      - key: ALLOWED_ORIGINS
        value: https://grant-reviewer-ai.vercel.app
      - key: PORT
        value: "8000"
    healthCheckPath: /health
